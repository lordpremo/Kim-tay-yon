<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <title>Temple Runner 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    canvas { display: block; }

    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      color: #fff;
      z-index: 10;
      font-size: 16px;
      text-shadow: 0 0 5px #000;
      background: rgba(0,0,0,0.4);
      padding: 8px 12px;
      border-radius: 6px;
      max-width: 260px;
      display: none; /* itaonekana baada ya kuanza game */
    }
    #hud .row { margin-bottom: 4px; }
    #hud span.value { font-weight: bold; color: #ffd700; }
    #missions { margin-top: 6px; font-size: 13px; }
    #missions div { margin-bottom: 2px; }
    #missions .done { color: #7CFC00; text-decoration: line-through; }

    #gameOver {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0.7);
      color: #fff;
      z-index: 20;
      text-align: center;
    }
    #gameOver h1 { font-size: 36px; margin-bottom: 10px; }
    #gameOver p { margin: 4px 0; }
    #gameOver button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #ffd700;
      color: #000;
      cursor: pointer;
    }

    #homeScreen {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at top, #444 0, #111 45%, #000 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 30;
    }
    #homeScreen h1 {
      font-size: 40px;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }
    #homeScreen p {
      margin: 4px 0;
      opacity: 0.9;
    }
    #homeScreen button {
      margin-top: 15px;
      padding: 10px 24px;
      font-size: 16px;
      border: none;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffd700, #ff8c00);
      color: #000;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 0 15px rgba(255,215,0,0.5);
    }
    #giftInfo {
      margin-top: 10px;
      font-size: 14px;
      color: #ffd700;
    }
  </style>
</head>
<body>
  <!-- HOME SCREEN -->
  <div id="homeScreen">
    <h1>TEMPLE RUNNER 3D</h1>
    <p>Kimbia, epuka obstacles, kusanya coins, maliza missions.</p>
    <p>Gift ya kuanza: <strong>+50 coins</strong> ukianza game.</p>
    <button id="btnStart">ANZA KUCHEZA</button>
    <div id="giftInfo">Tap / Click kuanza, swipe au arrow keys kudhibiti.</div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div class="row">Umbali: <span id="score" class="value">0</span> m</div>
    <div class="row">Coins: <span id="coins" class="value">0</span></div>
    <div id="missions"></div>
  </div>

  <!-- GAME OVER -->
  <div id="gameOver">
    <h1>Game Over</h1>
    <p>Umbali: <span id="finalScore">0</span> m</p>
    <p>Coins: <span id="finalCoins">0</span></p>
    <button onclick="location.reload()">Cheza Tena</button>
  </div>

  <!-- MUSIC (royalty-free style placeholder) -->
  <audio id="bgMusic" loop>
    <!-- unaweza kubadilisha src hii baadaye na track yako -->
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_7c3b8b9b4d.mp3?filename=epic-heroic-cinematic-trailer-116199.mp3" type="audio/mpeg">
  </audio>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
