<!DOCTYPE html>
<html lang="sw">
<head>
  <meta charset="UTF-8">
  <title>Temple Runner 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    canvas { display: block; }
    #hud {
      position: fixed;
      top: 10px;
      left: 10px;
      color: #fff;
      z-index: 10;
      font-size: 16px;
      text-shadow: 0 0 5px #000;
      background: rgba(0,0,0,0.4);
      padding: 8px 12px;
      border-radius: 6px;
      max-width: 260px;
    }
    #hud .row { margin-bottom: 4px; }
    #hud span.value { font-weight: bold; color: #ffd700; }
    #missions { margin-top: 6px; font-size: 13px; }
    #missions div { margin-bottom: 2px; }
    #missions .done { color: #7CFC00; text-decoration: line-through; }

    #gameOver {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0.7);
      color: #fff;
      z-index: 20;
      text-align: center;
    }
    #gameOver h1 { font-size: 36px; margin-bottom: 10px; }
    #gameOver p { margin: 4px 0; }
    #gameOver button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      background: #ffd700;
      color: #000;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="hud">
    <div class="row">Umbali: <span id="score" class="value">0</span> m</div>
    <div class="row">Coins: <span id="coins" class="value">0</span></div>
    <div id="missions"></div>
  </div>

  <div id="gameOver">
    <h1>Game Over</h1>
    <p>Umbali: <span id="finalScore">0</span> m</p>
    <p>Coins: <span id="finalCoins">0</span></p>
    <button onclick="location.reload()">Cheza Tena</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
